name: Build Bonsamp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract ZIP
        run: |
          ZIP=$(ls *.zip 2>/dev/null | head -1)
          echo "ZIP: $ZIP"
          unzip -o "$ZIP" -d extracted
          ls extracted/
          cp -r extracted/bonsamp/. . 2>/dev/null || cp -r extracted/. .
          ls -la

      - name: Setup project files
        run: |
          mkdir -p app/src/main/java/com/bonsamp/mobile/ui/fragment
          mkdir -p app/src/main/java/com/bonsamp/mobile/ui/adapter
          mkdir -p app/src/main/java/com/bonsamp/mobile/model
          mkdir -p app/src/main/res/{layout,drawable,values}
          mkdir -p app/src/main/res/{mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p gradle/wrapper

          for f in SplashActivity.kt MainActivity.kt DownloadActivity.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/bonsamp/mobile/ui/
          done
          for f in HomeFragment.kt ServersFragment.kt NewsFragment.kt PlayFragment.kt SettingsFragment.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/bonsamp/mobile/ui/fragment/
          done
          [ -f "ServerAdapter.kt" ] && mv ServerAdapter.kt app/src/main/java/com/bonsamp/mobile/ui/adapter/
          [ -f "ServerEntry.kt" ] && mv ServerEntry.kt app/src/main/java/com/bonsamp/mobile/model/

          for f in activity_splash.xml activity_main.xml activity_download.xml fragment_home.xml fragment_servers.xml fragment_news.xml fragment_play.xml fragment_settings.xml item_server.xml item_stat_row.xml; do
            [ -f "$f" ] && mv "$f" app/src/main/res/layout/
          done
          for f in bg_card.xml bg_nav_item.xml bg_nav_selected.xml bg_btn_blue.xml bg_btn_outline.xml bg_server_row.xml bg_tab_item.xml bg_tab_selected.xml progress_bar.xml progress_ring.xml splash_bg.xml; do
            [ -f "$f" ] && mv "$f" app/src/main/res/drawable/
          done
          for f in strings.xml colors.xml themes.xml dimens.xml arrays.xml; do
            [ -f "$f" ] && mv "$f" app/src/main/res/values/
          done
          [ -f "AndroidManifest.xml" ] && mv AndroidManifest.xml app/src/main/
          for dir in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            [ -f "ic_launcher.xml" ] && cp ic_launcher.xml app/src/main/res/$dir/
          done

      - name: Create Gradle files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              ext { kotlin_version = '1.9.0' }
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > settings.gradle << 'EOF'
          rootProject.name = "Bonsamp"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          cat > gradlew << 'EOF'
          #!/bin/sh
          exec java -jar "$(dirname $0)/gradle/wrapper/gradle-wrapper.jar" "$@"
          EOF
          chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tail -80

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bonsamp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
